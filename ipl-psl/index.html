<script>

/* =========================
   LOGO FUNCTION (CLEAN)
========================= */

function getLogo(team, isLive){

  if(!team) return "";

  let slug = team
    .toLowerCase()
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]/g, "");

  const url = `https://aimages.willow.tv/teamLogos/${slug}.png`;

  return `
    <div class="flex justify-center">
      
      <div class="
        ${isLive ? 'ring-2 ring-red-500 animate-pulse' : ''}
        rounded-full p-[3px]
        bg-gradient-to-tr from-pink-500 via-purple-500 to-indigo-500
      ">
        <div class="bg-[#050b2e] rounded-full p-2">
          <img src="${url}"
               loading="lazy"
               onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(team)}&background=111827&color=fff';"
               class="w-12 h-12 object-contain rounded-full">
        </div>
      </div>

    </div>
  `;
}

/* =========================
   COUNTDOWN (DAYS + HOURS)
========================= */

function getCountdown(startTime){

  const now = new Date();
  const diff = new Date(startTime) - now;

  if(diff <= 0) return "LIVE";

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));

  /* ALWAYS SHOW MINUTES */
  if(d > 0){
    return `${d}d ${h}h ${m}m`;
  } else if(h > 0){
    return `${h}h ${m}m`;
  } else {
    return `${m}m`;
  }
}
/* =========================
   MATCH CARD
========================= */


function createMatchCard(m){

  const team1 = m.team1;
  const team2 = m.team2;
  const league = m.league;

  const start = new Date(m.start_time);
  const now = new Date();

  const diff = start - now;

  /* TIME STATES */
  const matchDuration = 2.5 * 60 * 60 * 1000;

  const isLive = diff <= 0 && diff >= -matchDuration;

  const clickableTime = new Date(start.getTime() - 15 * 60 * 1000);
  const isClickable = now >= clickableTime && diff >= -matchDuration;

  const isStartingSoon = diff > 0 && diff <= (5 * 60 * 1000);

  const countdown = isLive ? "LIVE" : getCountdown(m.start_time);

  /* URL */
  const slug = team1.toLowerCase().replace(/[^a-z0-9]/g,'');
  const matchURL = `https://match-details.wicketgoal-tv.com/?match=${slug}`;

  return `
  <a href="${isClickable ? matchURL : '#'}"
     class="block ${isClickable ? 'cursor-pointer' : 'cursor-default'}">

    <article class="glass rounded-2xl p-5 shadow-2xl transition duration-300
      ${isClickable ? 'hover:scale-[1.05] hover:shadow-[0_0_30px_rgba(255,0,80,0.4)]' : ''}">

      <!-- TOP -->
      <div class="flex justify-between items-center">

        <span class="text-xs px-3 py-1 rounded-full bg-gradient-to-r from-purple-600 to-indigo-500 font-bold">
          ${league}
        </span>

        ${
          isLive
          ? `<span class="text-xs bg-red-600 px-2 py-1 rounded-full animate-pulse font-bold">LIVE</span>`
          : isStartingSoon
          ? `<span class="text-xs bg-orange-500 px-2 py-1 rounded-full font-bold animate-pulse">🔥 Starting Soon</span>`
          : ""
        }

      </div>

      <!-- TEAMS -->
      <div class="flex items-center justify-between mt-5">
        
        <div class="text-center w-2/5">
          ${getLogo(team1, isLive)}
          <div class="font-semibold text-sm mt-2">${team1}</div>
        </div>

        <div class="text-yellow-400 font-black text-xl">VS</div>

        <div class="text-center w-2/5">
          ${getLogo(team2, isLive)}
          <div class="font-semibold text-sm mt-2">${team2}</div>
        </div>

      </div>

      <!-- INFO -->
      <div class="text-xs leading-6 mt-5 opacity-90 text-center">
        📅 ${start.toLocaleDateString()} • ⏰ ${start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}<br>
        📍 ${m.venue || "TBA"}<br>
        ⏳ ${countdown}
      </div>

      <!-- CTA -->
      ${
        isClickable
        ? `<div class="live-glow mt-5 text-center py-3 rounded-xl font-black bg-gradient-to-r from-red-600 to-pink-500">
             ▶ Watch Live Now
           </div>`
        : `<div class="mt-5 text-center py-3 rounded-xl font-black bg-gradient-to-r from-blue-400 to-cyan-300 text-black">
             Upcoming Match
           </div>`
      }

    </article>

  </a>`;
}

/* =========================
   LOAD + MERGE + SORT
========================= */

const IPL_API = "https://ipl-api.pages.dev/api/match.json";
const PSL_API = "https://ipl-api.pages.dev/api/psl.json";

async function loadMatches(){

  const box = document.getElementById("matches");

  if(!box) return;

  box.innerHTML = "Loading live matches...";

  try{

    const [iplRes, pslRes] = await Promise.all([
      fetch(IPL_API),
      fetch(PSL_API)
    ]);

    const iplData = await iplRes.json();
    const pslData = await pslRes.json();

    const iplMatches = (iplData.matches || []).map(m => ({...m, league:"IPL"}));
    const pslMatches = (pslData.matches || []).map(m => ({...m, league:"PSL"}));

    let allMatches = [...iplMatches, ...pslMatches];

    allMatches.sort((a,b)=> new Date(a.start_time) - new Date(b.start_time));

    box.innerHTML = "";

    allMatches.forEach(m=>{
      box.innerHTML += createMatchCard(m);
    });

  }catch(e){
    console.error(e);
    box.innerHTML = "Failed to load matches";
  }
}

/* RUN ONLY ONCE */
loadMatches();
