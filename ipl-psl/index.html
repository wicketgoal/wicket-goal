<script>

/* =========================
   SAFE FETCH FUNCTION
========================= */

async function fetchJSON(url){
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error("Network error");
    return await res.json();
  }catch(err){
    console.error("API Error:", err);
    return null;
  }
}

/* =========================
   COUNTDOWN
========================= */

function getCountdown(startTime){
  const now = new Date();
  const diff = new Date(startTime) - now;

  if(diff <= 0) return "LIVE";

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));

  return `${h}h ${m}m`;
}

/* =========================
   CARD
========================= */

function createMatchCard(m, league){

  if(!m.team1 || !m.team2) return "";

  const start = new Date(m.start_time);

  const date = start.toLocaleDateString();
  const time = start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  const countdown = getCountdown(m.start_time);
  const isLive = countdown === "LIVE";

  return `
  <article class="glass rounded-2xl p-5 shadow-2xl">

    <p class="text-xs text-blue-300">${league}</p>

    <div class="flex items-center justify-between mt-3">
      <div class="text-center w-2/5 font-bold text-sm">${m.team1}</div>
      <div class="text-yellow-400 font-black text-xl">VS</div>
      <div class="text-center w-2/5 font-bold text-sm">${m.team2}</div>
    </div>

    <div class="text-xs leading-6 mt-4 opacity-90">
      📅 ${date}<br>
      ⏰ ${time}<br>
      📍 ${m.venue || "TBA"}<br>
      ⏳ ${countdown}
    </div>

    ${
      isLive
      ? `<div class="live-glow mt-4 text-center py-3 rounded-xl font-black bg-red-600">🔴 LIVE NOW</div>`
      : `<div class="mt-4 text-center py-3 rounded-xl font-black bg-blue-400 text-black">Upcoming</div>`
    }

  </article>`;
}

/* =========================
   LOAD MATCHES
========================= */

const IPL_API = "https://ipl-api.pages.dev/api/match.json";
const PSL_API = "https://ipl-api.pages.dev/api/psl.json";

async function loadMatches(){

  const iplBox = document.getElementById("iplMatches");
  const pslBox = document.getElementById("pslMatches");

  if(!iplBox || !pslBox){
    console.error("Container missing!");
    return;
  }

  iplBox.innerHTML = "Loading IPL matches...";
  pslBox.innerHTML = "Loading PSL matches...";

  const iplData = await fetchJSON(IPL_API);
  const pslData = await fetchJSON(PSL_API);

  /* IPL */
  if(iplData && iplData.matches){
    iplBox.innerHTML = "";
    iplData.matches.forEach(m=>{
      iplBox.innerHTML += createMatchCard(m, "IPL 2026");
    });
  } else {
    iplBox.innerHTML = "Failed to load IPL data";
  }

  /* PSL */
  if(pslData && pslData.matches){
    pslBox.innerHTML = "";
    pslData.matches.forEach(m=>{
      pslBox.innerHTML += createMatchCard(m, "PSL 2026");
    });
  } else {
    pslBox.innerHTML = "Failed to load PSL data";
  }
}

/* RUN */
loadMatches();

</script>
