<script>

/* =========================
   TEAM SHORT NAMES
========================= */

const teamShort = {
  "Mumbai Indians":"MI",
  "Chennai Super Kings":"CSK",
  "Royal Challengers Bengaluru":"RCB",
  "Kolkata Knight Riders":"KKR",
  "Delhi Capitals":"DC",
  "Punjab Kings":"PBKS",
  "Rajasthan Royals":"RR",
  "Sunrisers Hyderabad":"SRH",

  "Lahore Qalandars":"LQ",
  "Karachi Kings":"KK",
  "Peshawar Zalmi":"PZ",
  "Islamabad United":"IU",
  "Multan Sultans":"MS",
  "Quetta Gladiators":"QG"
};

/* =========================
   LOGO FUNCTION (FIXED)
========================= */

function getLogo(team, isLive){

  if(!team) return "";

  let slug = team
    .toLowerCase()
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]/g, "");

  const url = `https://aimages.willow.tv/teamLogos/${slug}.png`;

  return `
    <div class="flex flex-col items-center">
      
      <div class="${isLive ? 'animate-pulse ring-2 ring-red-500 rounded-full p-1' : ''}">
        <img src="${url}"
             loading="lazy"
             onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(team)}&background=111827&color=fff';"
             class="w-14 h-14 rounded-full object-contain bg-black p-1">
      </div>

      <div class="text-xs mt-1 bg-white/10 px-2 py-[2px] rounded-full font-bold">
        ${teamShort[team] || team.slice(0,3).toUpperCase()}
      </div>

    </div>
  `;
}

/* =========================
   COUNTDOWN
========================= */

function getCountdown(startTime){

  const now = new Date();
  const diff = new Date(startTime) - now;

  if(diff <= 0) return "LIVE";

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

  return `${d}d ${h}h`;
}

/* =========================
   MATCH CARD
========================= */

function createMatchCard(m){

  const team1 = m.team1;
  const team2 = m.team2;
  const league = m.league;

  const start = new Date(m.start_time);

  const date = start.toLocaleDateString();
  const time = start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  const countdown = getCountdown(m.start_time);
  const isLive = countdown === "LIVE";

  return `
  <article class="glass rounded-2xl p-5 shadow-2xl hover:scale-[1.03] transition">

    <!-- League Badge -->
    <div class="flex justify-between items-center">
      <span class="text-xs px-3 py-1 rounded-full bg-gradient-to-r from-purple-600 to-indigo-500 font-bold">
        ${league}
      </span>

      ${isLive ? `<span class="text-xs bg-red-600 px-2 py-1 rounded-full animate-pulse">LIVE</span>` : ""}
    </div>

    <!-- Teams -->
    <div class="flex items-center justify-between mt-5">
      
      <div class="text-center w-2/5">
        ${getLogo(team1, isLive)}
        <div class="font-semibold text-sm mt-2">${team1}</div>
      </div>

      <div class="text-yellow-400 font-black text-xl">VS</div>

      <div class="text-center w-2/5">
        ${getLogo(team2, isLive)}
        <div class="font-semibold text-sm mt-2">${team2}</div>
      </div>

    </div>

    <!-- Info -->
    <div class="text-xs leading-6 mt-5 opacity-90 text-center">
      📅 ${date} • ⏰ ${time}<br>
      📍 ${m.venue || "TBA"}<br>
      ⏳ ${countdown}
    </div>

    <!-- Button -->
    ${
      isLive
      ? `<a href="/match/${team1.toLowerCase().replace(/ /g,'-')}-vs-${team2.toLowerCase().replace(/ /g,'-')}/"
           class="live-glow block mt-5 text-center py-3 rounded-xl font-black bg-gradient-to-r from-red-600 to-pink-500">
           🔴 Watch Live
         </a>`
      : `<div class="mt-5 text-center py-3 rounded-xl font-black bg-gradient-to-r from-blue-400 to-cyan-300 text-black">
           Upcoming Match
         </div>`
    }

  </article>`;
}

/* =========================
   LOAD + MERGE + SORT
========================= */

const IPL_API = "https://ipl-api.pages.dev/api/match.json";
const PSL_API = "https://ipl-api.pages.dev/api/psl.json";

async function loadMatches(){

  const box = document.getElementById("matches");

  if(!box) return;

  box.innerHTML = "Loading live matches...";

  try{

    const [iplRes, pslRes] = await Promise.all([
      fetch(IPL_API),
      fetch(PSL_API)
    ]);

    const iplData = await iplRes.json();
    const pslData = await pslRes.json();

    const iplMatches = (iplData.matches || []).map(m => ({...m, league:"IPL"}));
    const pslMatches = (pslData.matches || []).map(m => ({...m, league:"PSL"}));

    let allMatches = [...iplMatches, ...pslMatches];

    allMatches.sort((a,b)=> new Date(a.start_time) - new Date(b.start_time));

    box.innerHTML = "";

    allMatches.forEach(m=>{
      box.innerHTML += createMatchCard(m);
    });

  }catch(e){
    console.error(e);
    box.innerHTML = "Failed to load matches";
  }
}

/* RUN */
loadMatches();

/* AUTO REFRESH */
setInterval(loadMatches, 30000);

</script>
