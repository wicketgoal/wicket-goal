  "Delhi Capitals":"https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_160,q_50,q_50/lsci/db/PICTURES/CMS/317400/317417.png",

  "Lahore Qalandars":"https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_160,q_50/lsci/db/PICTURES/CMS/313100/313128.logo.png",
  "Karachi Kings":"https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_160,q_50/lsci/db/PICTURES/CMS/313100/313129.logo.png",

};

/* =========================
   COUNTDOWN FUNCTION
========================= */

function getCountdown(startTime){
  const now = new Date();
  const diff = new Date(startTime) - now;

  if(diff <= 0) return "LIVE NOW";

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));

  return `${h}h ${m}m`;
}

/* =========================
   MATCH CARD
========================= */

function createMatchCard(m, league){

  const team1 = m.team1;
  const team2 = m.team2;
  const venue = m.venue || "TBA";

  const start = new Date(m.start_time);

  const date = start.toLocaleDateString();
  const time = start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  const countdown = getCountdown(m.start_time);
  const isLive = countdown === "LIVE NOW";

  return `
  <article class="glass rounded-2xl p-5 shadow-2xl hover:scale-[1.02] transition">

    <p class="text-xs text-blue-300">${league}</p>

    <div class="flex items-center justify-between mt-3">
      
      <div class="text-center w-2/5">
        <img src="${teamLogos[team1] || ''}" class="w-14 h-14 mx-auto">
        <div class="font-bold text-sm mt-1">${team1}</div>
      </div>

      <div class="text-yellow-400 font-black text-xl">VS</div>

      <div class="text-center w-2/5">
        <img src="${teamLogos[team2] || ''}" class="w-14 h-14 mx-auto">
        <div class="font-bold text-sm mt-1">${team2}</div>
      </div>

    </div>

    <div class="text-xs leading-6 mt-4 opacity-90">
      📅 ${date}<br>
      ⏰ ${time}<br>
      📍 ${venue}<br>
      ⏳ ${countdown}
    </div>

    ${
      isLive
      ? `<a href="/match/${team1.toLowerCase().replace(/ /g,'-')}-vs-${team2.toLowerCase().replace(/ /g,'-')}/"
           class="live-glow block mt-4 text-center py-3 rounded-xl font-black bg-gradient-to-r from-red-600 to-pink-500">
           🔴 Watch Live
         </a>`
      : `<div class="mt-4 text-center py-3 rounded-xl font-black bg-gradient-to-r from-blue-400 to-cyan-300 text-black">
           Upcoming Match
         </div>`
    }

  </article>`;
}

/* =========================
   LOAD DATA
========================= */

const IPL_API = "https://ipl-api.pages.dev/api/match.json";
const PSL_API = "https://ipl-api.pages.dev/api/psl.json";

async function loadMatches(){

  const iplBox = document.getElementById("iplMatches");
  const pslBox = document.getElementById("pslMatches");

  iplBox.innerHTML = "Loading IPL...";
  pslBox.innerHTML = "Loading PSL...";

  try{

    const [iplRes, pslRes] = await Promise.all([
      fetch(IPL_API),
      fetch(PSL_API)
    ]);

    const iplData = await iplRes.json();
    const pslData = await pslRes.json();

    iplBox.innerHTML = "";
    pslBox.innerHTML = "";

    iplData.matches.forEach(m=>{
      iplBox.innerHTML += createMatchCard(m, "IPL 2026");
    });

    pslData.matches.forEach(m=>{
      pslBox.innerHTML += createMatchCard(m, "PSL 2026");
    });

  }catch(e){
    iplBox.innerHTML = "Failed to load IPL";
    pslBox.innerHTML = "Failed to load PSL";
    console.error(e);
  }
}

loadMatches();

/* =========================
   AUTO REFRESH (EVERY 30s)
========================= */

setInterval(loadMatches, 30000);

</script>
