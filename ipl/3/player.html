<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wicketgoal Player</title>

<!-- Shaka -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<!-- HLS.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
  }

  #container {
    width: 100%;
    height: 100%;
  }

  video, iframe {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: contain;
  }
</style>
</head>

<body>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <iframe id="iframe" style="display:none;" allowfullscreen></iframe>
</div>

<script>
async function init() {
  const video = document.getElementById("video");
  const iframe = document.getElementById("iframe");

  const params = new URLSearchParams(location.search);
  const id = params.get("id") || "star";

  const data = await fetch("playlist.json").then(r => r.json());
  const stream = data[id];

  if (!stream) {
    alert("Stream not found");
    return;
  }

  // 🔴 IFRAME MODE
  if (stream.type === "iframe") {
    video.style.display = "none";
    iframe.style.display = "block";
    iframe.src = stream.url;
    return;
  }

  // 🟢 HLS (.m3u8)
  if (stream.url.includes(".m3u8")) {

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(stream.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
      });
    } 
    else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = stream.url;
      video.play();
    }

  } 
  else {
    // 🔵 DASH / DRM (Shaka)
    shaka.polyfill.installAll();

    const player = new shaka.Player(video);

    if (stream.keys) {
      player.configure({
        drm: {
          clearKeys: stream.keys
        }
      });
    }

    try {
      await player.load(stream.url);
      video.play();
    } catch (e) {
      console.error(e);
    }
  }
}

document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
