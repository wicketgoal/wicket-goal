<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WicketGoal TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

#player{
    width:100%;
    height:100vh;
    background:#000;
}

#overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.75);
    color:#fff;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    z-index:99;
    transition:.3s;
}

#error{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    color:#fff;
    align-items:center;
    justify-content:center;
    font-size:22px;
}
</style>

</head>
<body>

<video
id="player"
controls
playsinline
autoplay
></video>

<div id="overlay">
▶ Click to Watch Live
</div>

<div id="error"></div>

<script>
(async function(){

const params=new URLSearchParams(window.location.search);

const channel=params.get("id") || "yosintv11";

const video=document.getElementById("player");
const overlay=document.getElementById("overlay");
const error=document.getElementById("error");

try{

const response=await fetch(`https://kick.com/api/v2/channels/${channel}`);

const data=await response.json();

if(!data.playback_url){

error.style.display="flex";
error.innerHTML="Stream is Offline";
return;

}

const stream=data.playback_url;

if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src=stream;

}else if(Hls.isSupported()){

const hls=new Hls();

hls.loadSource(stream);

hls.attachMedia(video);

}else{

error.style.display="flex";
error.innerHTML="This browser does not support HLS.";

return;

}

overlay.onclick=function(){

overlay.style.display="none";

video.muted=false;

video.play();

};

}catch(e){

console.log(e);

error.style.display="flex";

error.innerHTML="Unable to load stream.";

}

})();
</script>

</body>
</html>
