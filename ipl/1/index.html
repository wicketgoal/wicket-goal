<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Football Live Stream</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css"
      crossorigin="anonymous">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"
        crossorigin="anonymous"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.video-container,
#player-wrap{
    position:absolute;
    inset:0;
    background:#000;
}

#video{
    width:100%;
    height:100%;
}

.shaka-spinner-container,
.shaka-buffering-spinner,
.shaka-spinner{
    display:none!important;
}

#status{
    position:fixed;
    left:12px;
    bottom:12px;
    z-index:100;
    color:#fff;
    background:rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.2);
    border-radius:8px;
    padding:6px 10px;
    font-size:12px;
    max-width:90vw;
}

#status:empty{
    display:none;
}
</style>
</head>

<body>

<div class="video-container">
    <div id="player-wrap" data-shaka-player-container>
        <video
            id="video"
            data-shaka-player
            autoplay
            playsinline
            muted>
        </video>
    </div>
</div>

<div id="status"></div>

<script>
function showStatus(message){
    document.getElementById("status").textContent = message;
}

function onPlayerError(error){
    console.error(error);
    showStatus("Playback failed.");
}

async function initPlayer(){

    if(!window.shaka || !shaka.Player.isBrowserSupported()){
        showStatus("Browser not supported.");
        return;
    }

    shaka.polyfill.installAll();

    const video = document.getElementById("video");

    if(!video.ui){
        setTimeout(initPlayer,100);
        return;
    }

    const ui = video.ui;
    const controls = ui.getControls();
    const player = controls.getPlayer();

    player.addEventListener("error",(e)=>onPlayerError(e.detail));
    controls.addEventListener("error",(e)=>onPlayerError(e.detail));

    ui.configure({
        controlPanelElements:[
            "play_pause",
            "mute",
            "volume",
            "spacer",
            "time_and_duration",
            "quality",
            "fullscreen",
            "overflow_menu"
        ]
    });

    player.configure({
        streaming:{
            bufferingGoal:20,
            rebufferingGoal:2,
            bufferBehind:20
        }

        /*
        Add your own authorized DRM configuration here if required.
        */
    });

    try{

        // Replace with your own authorized stream URL.
        await player.load("YOUR_STREAM_URL_HERE");

        showStatus("");

        video.muted = false;

        await video.play();

    }catch(err){
        onPlayerError(err);
    }
}

function initFailed(){
    showStatus("Unable to load Shaka Player.");
}

document.addEventListener("shaka-ui-loaded",initPlayer);
document.addEventListener("shaka-ui-load-failed",initFailed);

if("wakeLock" in navigator){
    navigator.wakeLock.request("screen").catch(()=>{});
}
</script>

</body>
</html>
