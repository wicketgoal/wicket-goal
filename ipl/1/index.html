<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Football Live Stream</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css"
      crossorigin="anonymous">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"
        crossorigin="anonymous"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.video-container,
#player-wrap{
    position:absolute;
    inset:0;
    background:#000;
}

#video{
    width:100%;
    height:100%;
}

.shaka-spinner-container,
.shaka-buffering-spinner,
.shaka-spinner{
    display:none!important;
}

#status{
    position:fixed;
    left:12px;
    bottom:12px;
    z-index:100;
    color:#fff;
    background:rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.2);
    border-radius:8px;
    padding:6px 10px;
    font-size:12px;
    max-width:90vw;
}

#status:empty{
    display:none;
}
</style>
</head>

<body>

<div class="video-container">
    <div id="player-wrap" data-shaka-player-container>
        <video
            id="video"
            data-shaka-player
            autoplay
            playsinline
            muted>
        </video>
    </div>
</div>

<div id="status"></div>

  <script>
    function showStatus(text) {
      var s = document.getElementById('status');
      if (s) s.textContent = text;
    }

    function onPlayerError(error) {
      var code = error && error.code ? error.code : 'UNKNOWN';
      console.error('Shaka error', error);
      showStatus('Stream failed (' + code + ')');
    }

    async function initPlayer() {
      if (!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()) {
        showStatus('Browser not supported');
        return;
      }

      shaka.polyfill.installAll();

      var video = document.getElementById('video');
      if (!video || !video.ui) {
        setTimeout(initPlayer, 80);
        return;
      }

      var ui = video.ui;
      var controls = ui.getControls();
      var player = controls.getPlayer();

      player.addEventListener('error', function(ev) { onPlayerError(ev.detail); });
      controls.addEventListener('error', function(ev) { onPlayerError(ev.detail); });

      ui.configure({
        controlPanelElements: [
          "play_pause",
          "mute",
          "volume",
          "spacer",
          "time_and_duration",
          "quality",
          "fullscreen",
          "overflow_menu"
        ]
      });

      player.configure({
        drm: {
          clearKeys: { "2c338a117d434ce4bbe3569231af90f1": "a9633d901ee8a3f4f58ac314b5c5f4fb" }
        },
        streaming: { bufferingGoal: 20, rebufferingGoal: 2, bufferBehind: 20 }
      });

      try {
        await player.load("https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/fifa_ppv1/default/index.mpd");
        showStatus('');
        video.muted = false;
        video.play().catch(function() {});
      } catch (e) {
        onPlayerError(e);
      }
    }

    function initFailed() {
      showStatus('Unable to load Shaka UI');
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
    document.addEventListener('shaka-ui-load-failed', initFailed);

    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').catch(function() {});
    }
  </script>

</body>
</html>
