
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
}
video {
    width: 100%;
    height: 100vh;
}
#overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    font-size: 20px;
    cursor: pointer;
}
</style>
</head>
<body>

<video id="video" controls playsinline></video>
<div id="overlay">Click to Watch Live</div>

<script>
(async function () {

    // Get username from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get("id") || "yosintv11";

    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");

    try {
        const res = await fetch(`https://kick.com/api/v2/channels/${username}`);
        const data = await res.json();

        if (!data.playback_url) {
            document.body.innerHTML = "<h1 style='color:white;text-align:center'>Stream Offline</h1>";
            return;
        }

        const streamURL = data.playback_url;

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamURL;
        } else if (Hls.isSupported()) {
            const hls = new Hls({
                xhrSetup: function (xhr) {
                    xhr.withCredentials = true;
                }
            });
            hls.loadSource(streamURL);
            hls.attachMedia(video);
        } else {
            document.body.innerHTML = "<h1 style='color:white;text-align:center'>Browser not supported</h1>";
        }

        // Start unmuted after user click
        overlay.addEventListener("click", function () {
            video.muted = false;
            video.play();
            overlay.style.display = "none";
        });

    } catch (e) {
        document.body.innerHTML = "<h1 style='color:white;text-align:center'>Error loading stream</h1>";
    }
})();
</script>

</body>
</html>
