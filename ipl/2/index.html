<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Player</title>

  <!-- Shaka Player -->
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css">

  <style>
    body {
      margin: 0;
      background: #000;
    }
    .shaka-video-container {
      width: 100%;
      height: 100vh;
    }
    video {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<div data-shaka-player-container class="shaka-video-container">
  <video autoplay controls data-shaka-player id="video"></video>
</div>

<script>
async function initPlayer() {
  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  // Error handling
  player.addEventListener('error', e => {
    console.error('Error:', e.detail);
  });

  // 👉 PUT YOUR STREAM URL HERE
  const manifestUri = "YOUR_MPD_OR_M3U8_LINK_HERE";

  try {
    await player.load(manifestUri);
    console.log('Video loaded successfully');
  } catch (error) {
    console.error('Load failed:', error);
  }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
