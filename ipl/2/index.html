<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>

  <!-- Video.js CSS -->
  <link href="https://vjs.zencdn.net/8.5.2/video-js.css" rel="stylesheet" />

  <!-- hls.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Video.js -->
  <script src="https://vjs.zencdn.net/8.5.2/video.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    .video-js {
      width: 100% !important;
      height: 80% !important;
    }

    .vjs-control-bar {
      font-size: 14px;
    }
  </style>
</head>

<body>

<video
  id="video"
  class="video-js vjs-default-skin"
  controls
  autoplay
  muted
  playsinline
></video>

<script>
  const video = document.getElementById('video');
  const streamURL = "https://ru-001.local-honduras-center.sbs/secure/api/v1/lchd-ipltata.m3u8";

  // Initialize Video.js
  const player = videojs(video, {
    autoplay: true,
    muted: true,
    controls: true,
    preload: 'auto',
    fluid: true
  });

  if (Hls.isSupported()) {
    const hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      enableWorker: true,
      lowLatencyMode: true
    });

    hls.loadSource(streamURL);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      video.play();
    });

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = streamURL;
    video.addEventListener('loadedmetadata', function () {
      video.play();
    });
  }

  // Try fullscreen on load (may require user interaction on some devices)
  player.ready(function () {
    setTimeout(() => {
      const promise = player.requestFullscreen();
      if (promise !== undefined) {
        promise.catch(() => {});
      }
    }, 1000);
  });
</script>

</body>
</html>
