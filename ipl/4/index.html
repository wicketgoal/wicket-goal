
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: black;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #video {
        width: 100vw;
        height: 100vh;
        object-fit: contain; /* Makes sure video is fully visible without being cropped */
        background-color: black;
      }
      .watermark {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: 1.2rem;
        background: rgba(0,0,0,0.4);
        padding: 6px 18px;
        border-radius: 8px;
        z-index: 1000;
        pointer-events: none;
        font-family: sans-serif;
        letter-spacing: 1px;
      }
    </style>
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "rfwh20vkcj");
    </script>
  </head>
  <body>
    <video id="video" controls autoplay playsinline></video>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
      const video = document.getElementById("video");
      
      // Encrypted m3u8 link
      const encryptedSrc = "==AO1NTbuM3auVHaj9SbhVmc0NnLwATNxQESyMFVS9EUTJVQUNFdl52LtFWZyR3clZXasZHdwl2Lw5mLt92YuYHd0VmbuIDMtYHd0VmbtQHdv9yL6MHc0RHa";
      
      // Decrypt function
      function decryptLink(encrypted) {
        try {
          // Reverse the string and then decode from Base64
          return atob(encrypted.split('').reverse().join(''));
        } catch (e) {
          console.error("Failed to decrypt link:", e);
          return "";
        }
      }
      
      // Decrypt the link
      const videoSrc = decryptLink(encryptedSrc);

      function playVideo() {
        if (!videoSrc) {
          console.error("Invalid video source");
          return;
        }
        
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(videoSrc);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play();
          });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = videoSrc;
          video.addEventListener("loadedmetadata", function () {
            video.play();
          });
        }
      }

      playVideo();

      // Attempt fullscreen on user interaction
      document.addEventListener(
        "click",
        () => {
          if (video.requestFullscreen) video.requestFullscreen();
          else if (video.webkitRequestFullscreen)
            video.webkitRequestFullscreen();
          else if (video.msRequestFullscreen) video.msRequestFullscreen();
        },
        { once: true }
      );
    </script>
  </body>
</html>
