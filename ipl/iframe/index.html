<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream with ID</title>

<style>
body {
  height: 100vh;
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  text-align: center;
  overflow: hidden;
  font-family: Tahoma, sans-serif;
  -webkit-font-smoothing: antialiased;
}

#player {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<iframe 
  id="player"
  allowfullscreen
  allow="autoplay; fullscreen"
  sandbox="allow-scripts allow-same-origin allow-forms allow-presentation">
</iframe>

<script>
const channels = {

  1: "https://wicket-goal.pages.dev/m3u/?src=https://ott-nettv-02.nettv.com.np/iptvsports/netSTARSPORTS1HD1500.stream/playlist.m3u8",
  4: "https://wicket-goal.pages.dev/m3u/?src=https://ott-nettv-02.nettv.com.np/iptvsports/netSTARSPORTS3HD1500.stream/playlist.m3u8",
  2: "https://wicket-goal.pages.dev/m3u/?src=https://ru-001.local-honduras-center.sbs/secure/api/v1/lchd-fs501.m3u8",
 3: "https://tvplaytv.pages.dev/p6?url=https%3A%2F%2Ftvsen5.aynascope.net%2FcXPB2LKkErN9%2Findex.m3u8%3Fe%3D1775396095%26u%3D78be6644-0a65-48ec-81a4-089ac65a2619%26token%3Dfae1c243959c56c17674f92019416d55"
 

};

// Get ?id=
const urlParams = new URLSearchParams(window.location.search);
let channel = urlParams.get('id');

// Default fallback
const defaultChannel = "AFG";

function setChannel(id) {
  const iframe = document.getElementById('player');
  iframe.src = channels[id] || channels[defaultChannel];
}

// Load
setChannel(channel);
</script>

</body>
</html>
