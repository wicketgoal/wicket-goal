<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JW Player Stream</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #player {
      width: 100%;
      height: 100vh;
      background: #000;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 999;
    }

    @media (max-width: 768px) {
      #player {
        height: 100vh;
      }
    }
  </style>

  <!-- JW Player -->
  <script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>
</head>

<body>

<div id="status">Loading stream...</div>
<div id="player"></div>

<script>
(function () {

  // =========================
  // CONFIG
  // =========================

  // Fallback stream for Indian IPs
  const FALLBACK_STREAM =
    "https://embed-cloudfront.wistia.com/deliveries/8088191e65c591a9192f0f8a4266b1386a7b2381.m3u8";

  // Read stream parameter from URL
  // Example:
  // player.html?stream=https://example.com/live.m3u8
  const params = new URLSearchParams(window.location.search);
  const streamParam = params.get("stream");

  // Proxy URL
  const PROXY_BASE = "live222.php?url=";

  // Final stream URL
  let REAL_STREAM = "";

  if (streamParam) {
    REAL_STREAM = PROXY_BASE + encodeURIComponent(streamParam);
  }

  const statusBox = document.getElementById("status");

  // =========================
  // LOAD PLAYER
  // =========================

  function loadPlayer(streamUrl) {

    jwplayer("player").setup({
      file: streamUrl,
      autostart: true,
      mute: false,
      width: "100%",
      height: "100%",
      stretching: "uniform",
      controls: true,
      primary: "html5",
      hlshtml: true
    });

    // Quality list
    jwplayer("player").on("levels", function(event) {
      console.log("Available qualities:", event.levels);
    });

    // Error handling
    jwplayer("player").on("error", function(err) {
      console.error("Player Error:", err);
      statusBox.innerText = "Stream failed to load.";
    });
  }

  // =========================
  // GEO CHECK
  // =========================

  function detectCountryAndPlay() {

    fetch("https://ipapi.co/json/")
      .then(res => res.json())
      .then(data => {

        const country = data.country_code;

        console.log("Detected country:", country);

        // India → fallback stream
        if (country === "IN") {

          statusBox.innerText =
            "India detected • Playing fallback stream";

          loadPlayer(FALLBACK_STREAM);

        } else {

          statusBox.innerText =
            "Playing live stream";

          loadPlayer(REAL_STREAM);
        }

      })
      .catch(err => {

        console.warn("Geo detection failed:", err);

        statusBox.innerText =
          "Geo detection failed • Playing stream";

        loadPlayer(REAL_STREAM);
      });
  }

  // Start
  detectCountryAndPlay();

})();
</script>

</body>
</html>
