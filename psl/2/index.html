<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Live TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  display: flex;
  flex-wrap: wrap;
}

/* PLAYER */
.player {
  flex: 3;
  padding: 10px;
}

video {
  width: 100%;
  max-width: 1000px;
  background: black;
  border: 2px solid red;
  border-radius: 10px;
}

/* CHANNEL LIST */
.channels {
  flex: 1;
  max-height: 100vh;
  overflow-y: auto;
  background: #020617;
  border-left: 2px solid #1e293b;
}

.channel {
  padding: 12px;
  border-bottom: 1px solid #1e293b;
  cursor: pointer;
}

.channel:hover {
  background: #1e293b;
}

.active {
  background: red;
}

/* HEADER */
.header {
  text-align: center;
  padding: 10px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">📺 Pro Live Streaming</div>

<div class="container">

  <!-- PLAYER -->
  <div class="player">
    <video id="video" controls autoplay></video>
  </div>

  <!-- CHANNELS -->
  <div class="channels" id="channelList">
    <div class="channel active" onclick="playChannel(0, this)">A Sports HD</div>
    <div class="channel" onclick="playChannel(1, this)">Channel 2</div>
    <div class="channel" onclick="playChannel(2, this)">Channel 3</div>
  </div>

</div>

<script>
const video = document.getElementById('video');
let hls;

/* CHANNEL LIST (PUT YOUR STREAMS HERE) */
const channels = [
  "http://103.144.89.251:8082/A.SPORTS.HD/tracks-v1a1/mono.m3u8?token=b55c15161849d13d10572663e9328a2a85a82548-fd8431bcafcbcf62e3a6a629d3cc41cd-1774625116-1774614316",
  "PUT_SECOND_CHANNEL_LINK",
  "PUT_THIRD_CHANNEL_LINK"
];

/* PLAY FUNCTION */
function playChannel(index, el) {

  // destroy old player
  if (hls) {
    hls.destroy();
  }

  const stream = channels[index];

  if (Hls.isSupported()) {
    hls = new Hls({
      maxBufferLength: 30
    });

    hls.loadSource(stream);
    hls.attachMedia(video);

  } else {
    video.src = stream;
  }

  // UI active highlight
  document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

/* AUTO REFRESH STREAM EVERY 5 MIN */
setInterval(() => {
  if (hls) {
    console.log("Refreshing stream...");
    const current = video.src || channels[0];
    hls.loadSource(current);
  }
}, 300000); // 5 min

/* LOAD FIRST CHANNEL */
playChannel(0, document.querySelector('.channel'));

</script>

</body>
</html>
