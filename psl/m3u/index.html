<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shaka Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    video {
      width: 100%;
      max-width: 1000px;
      height: auto;
      outline: 2px solid red; /* your red outline */
    }
  </style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
  async function init() {
    const video = document.getElementById('video');
    const player = new shaka.Player(video);

    // Get stream URL from query (?src=)
    const params = new URLSearchParams(window.location.search);
    const streamUrl = params.get("src");

    if (!streamUrl) {
      alert("No stream URL provided!");
      return;
    }

    try {
      await player.load(streamUrl);
      console.log("Stream loaded:", streamUrl);
    } catch (e) {
      console.error("Error loading stream", e);
    }
  }

  init();
</script>

</body>
</html>
