<script>
const streamUrl = new URLSearchParams(window.location.search).get("src");

if (!streamUrl) {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:20%;'>No Stream Provided</h2>";
    throw new Error("Missing src parameter");
}

const video = document.getElementById("video");

if (Hls.isSupported()) {
    const hls = new Hls({
        // 🔥 safer config
        lowLatencyMode: false, // ❌ disable (important)
        maxBufferLength: 30,   // ✅ increase buffer
        maxMaxBufferLength: 60,
        liveSyncDuration: 10,
        liveMaxLatencyDuration: 20,

        backBufferLength: 30,  // ✅ keep some buffer
        maxBufferHole: 1,

        enableWorker: true,
    });

    hls.loadSource(streamUrl);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => console.log("Autoplay blocked"));
    });

    // 🔥 SMART ERROR HANDLING (NO RELOAD LOOP)
    hls.on(Hls.Events.ERROR, function (event, data) {
        console.log("HLS error:", data);

        if (data.fatal) {
            switch (data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                    console.log("Trying to recover network...");
                    hls.startLoad();
                    break;

                case Hls.ErrorTypes.MEDIA_ERROR:
                    console.log("Trying to recover media...");
                    hls.recoverMediaError();
                    break;

                default:
                    console.log("Destroying player...");
                    hls.destroy();
                    setTimeout(() => location.reload(), 5000);
                    break;
            }
        }
    });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = streamUrl;
    video.addEventListener('loadedmetadata', () => {
        video.play();
    });
}
</script>
