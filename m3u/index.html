<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WicketGoal Player</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
    background: black;
}
</style>
</head>

<body>

<video id="video" controls autoplay muted playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const stream = urlParams.get("src");

if (!stream) {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:20%'>No Stream Found</h2>";
    throw new Error("Missing stream");
}

const video = document.getElementById("video");

if (Hls.isSupported()) {
    const hls = new Hls({
        lowLatencyMode: false,     // ✅ IMPORTANT (fixes pause/play issue)
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        liveSyncDuration: 10,
        liveMaxLatencyDuration: 20,
        backBufferLength: 30,
    });

    hls.loadSource(stream);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {});
    });

    // ✅ smart recovery (NO reload loop)
    hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
            switch (data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                    hls.startLoad();
                    break;
                case Hls.ErrorTypes.MEDIA_ERROR:
                    hls.recoverMediaError();
                    break;
                default:
                    hls.destroy();
                    break;
            }
        }
    });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = stream;
    video.addEventListener('loadedmetadata', () => video.play());
}

// 🔥 auto-fix stall
video.addEventListener('stalled', () => video.play());
video.addEventListener('waiting', () => console.log("Buffering..."));
</script>

</body>
</html>
