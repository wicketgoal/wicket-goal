<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream with ID</title>

<style>
body {
  height: 100vh;
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  text-align: center;
  overflow: hidden;
  font-family: Tahoma, sans-serif;
  -webkit-font-smoothing: antialiased;
}

#player {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<iframe id="player" allowfullscreen allow="autoplay"></iframe>

<script>
const channels = {

  <!-- IPL MATCH 1 -->
  
  RCB1: "https://wicket-goal.pages.dev/ipl/iframe?id=1",
  RCB3: "https://wicket-goal.pages.dev/ipl/2",
  RCB4: "https://wicket-goal.pages.dev/ipl/3",
  RCB5:  "https://wicket-goal.pages.dev/ipl/4",
  RCB6:  "https://wicket-goal.pages.dev/ipl/iframe?id=1",

<!-- IPL MATCH 2 -->
  
  MI1: "https://wicket-goal.pages.dev/m3u/?src=https://grand-s-main.faggotsports.tv/out/v2/3a5b67d896f26d4ed700b86c64053eb7/index.m3u8",
  MI3: "https://wicket-goal.pages.dev/m3u/?src=https://live-global-cdn-v02.sooplive.co.kr/live-stm-04/auth_master_playlist.m3u8?aid=.A32.pxqRXFPZNcY9Qg1.b7ZZjCiHonupVXGqsx3otMrx3zj8IhBLEsNzOFogXb7sbAnrMd0hcy7yXSZbXhjm0caYmS9Tqhi7m0-j4M7ds7qA0PfdA6dHcJX4alK1mApltoXeJV9dcte1v0b5NI0243GQSeQzIHJLmhRFOgjcLtgS3C6MBLqRWvWepOdhlsx0k92SzcHLIexl20ATXfvFcGB6NV11NCvptxhVq-NFAw",
  MI4: "https://wicket-goal.pages.dev/htstar",
  MI5:  "https://wicket-goal.pages.dev/hindi",
  MI6:  "https://wicket-goal.pages.dev/m3u/?src=https://g-cdn.styxsports.live/LiveApp/streams/WO3yt0XpBBkNaYXh247781716930_adaptive.m3u8",

  <!-- PSL MATCH 1 -->
  QG1: "https://wicket-goal.pages.dev/psl/1/",
  QG3: "https://wicket-goal.pages.dev/psl/2/",
  PZ1: "https://wicket-goal.pages.dev/psl/1/",
  PZ3:  "https://wicket-goal.pages.dev/psl/2/",
  MS1:  "https://wicket-goal.pages.dev/psl/1/",
  MS3: "https://wicket-goal.pages.dev/psl/2/",
  LQ1: "https://wicket-goal.pages.dev/psl/1",
  LQ3: "https://wicket-goal.pages.dev/psl/2/",
  IU1:  "https://wicket-goal.pages.dev/psl/1/",

  HK1:  "https://wicket-goal.pages.dev/psl/1/",
  HK3:  "https://wicket-goal.pages.dev/psl/2/",
  KK1:  "https://wicket-goal.pages.dev/psl/1/",
  KK3:  "https://wicket-goal.pages.dev/psl/2/",
};

// Get ?id=
const urlParams = new URLSearchParams(window.location.search);
let channel = urlParams.get('id');

// Default fallback (must exist in object)
const defaultChannel = "OMA";

function setChannel(id) {
  const iframe = document.getElementById('player');
  iframe.src = channels[id] || channels[defaultChannel];
}

// Load
setChannel(channel);
</script>

</body>
</html>
