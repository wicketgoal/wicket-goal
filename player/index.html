<html lang="en">

#player {
  width: 100%;
  height: 100%;
  border: none;
}

<body>

<iframe id="player" allowfullscreen allow="autoplay"></iframe>

<script>

  KKR3: "https://wapgoo.pages.dev/?id=Star%20Sports%201%20HD",
  KKR5: "https://wicket-goal.pages.dev/ipl/1/",
  KKR4: "https://wicket-goal.pages.dev/m3u/?src=https://newcdn.tamils.click/live/index.m3u8",
  KKR6:  "https://wicket-goal.pages.dev/ipl/2",

  LQ4: "https://wicket-goal.pages.dev/psl/1",
  LQ3: "https://wicket-goal.pages.dev/psl/2/",
  LQ1: "https://wicket-goal.pages.dev/psl/2/",
  IU4:  "https://wicket-goal.pages.dev/psl/1/",

  B1: "https://wgtv.pages.dev/wg?m=118206",
  B3: "https://wgtv.pages.dev/wg?m=168740",

  PSG4: "https://wgtv.pages.dev/wg?m=494201"
};

// Get ?id=
const urlParams = new URLSearchParams(window.location.search);
let channel = urlParams.get('id');

// Default fallback (must exist in object)
const defaultChannel = "OMA";

function setChannel(id) {
  const iframe = document.getElementById('player');
  iframe.src = channels[id] || channels[defaultChannel];
}

// Load
setChannel(channel);
</script>
