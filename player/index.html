<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream with ID</title>

<style>
body {
  height: 100vh;
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  text-align: center;
  overflow: hidden;
  font-family: Tahoma, sans-serif;
  -webkit-font-smoothing: antialiased;
}

#player {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<iframe id="player" allowfullscreen allow="autoplay"></iframe>

<script>
const channels = {

  <!-- IPL MATCH 1 -->

  KKR4: "https://wicket-goal.pages.dev/ipl/iframe?id=2",
  KKR3: "https://wicket-goal.pages.dev/ipl/iframe?id=1",
  KKR1: "https://wicket-goal.pages.dev/m3u/?src=https://imgs-001.juno-api-noe.icu/secure/api/v1/lchd-fs501.m3u8",
  KKR5:  "https://wicket-goal.pages.dev/ipl/1/",
  KKR6:  "https://wicket-goal.pages.dev/ipl/iframe?id=1",

<!-- IPL MATCH 2 -->
  
  LSG5: "https://wicket-goal.pages.dev/m3u/?src=https://imgs-001.juno-api-noe.icu/secure/api/v1/lchd-ipltata.m3u8",
  LSG4: "https://wicket-goal.pages.dev/ipl/iframe?id=1",
  LSG3: "https://wicket-goal.pages.dev/m3u/?src=https://imgs-001.juno-api-noe.icu/secure/api/v1/lchd-fs501.m3u8",
  LSG1:  "https://wicket-goal.pages.dev/ipl/1/",
  LSG3:  "https://wicket-goal.pages.dev/ipl/iframe?id=2",

  <!-- PSL MATCH 1 -->
  QG1: "https://wicket-goal.pages.dev/psl/1/",
  QG3: "https://wicket-goal.pages.dev/psl/2/",
  QG4: "https://wicket-goal.pages.dev/psl/m3u/?id=1",
  PZ1: "https://wicket-goal.pages.dev/psl/1/",
  PZ3:  "https://wicket-goal.pages.dev/psl/2/",
  MS1:  "https://wicket-goal.pages.dev/psl/1/",
  MS4: "https://wicket-goal.pages.dev/psl/2/",
  MS3: "https://wicket-goal.pages.dev/psl/m3u/?id=1",
  LQ1: "https://wicket-goal.pages.dev/psl/1",
  LQ4: "https://wicket-goal.pages.dev/psl/2/",
  LQ3: "https://wicket-goal.pages.dev/psl/m3u/?id=1",
  IU1:  "https://wicket-goal.pages.dev/psl/1/",
  IU4:  "https://wicket-goal.pages.dev/psl/2/",
  IU3: "https://wicket-goal.pages.dev/psl/m3u/?id=1",
  R1:  "https://wicket-goal.pages.dev/psl/1/",
  R4:  "https://wicket-goal.pages.dev/psl/2/",
  R3: "https://wicket-goal.pages.dev/psl/m3u/?id=1",
  HK1:  "https://wicket-goal.pages.dev/psl/1/",
  HK4:  "https://wicket-goal.pages.dev/psl/2/",
  HK3: "https://wicket-goal.pages.dev/psl/m3u/?id=1",
  KK1:  "https://wicket-goal.pages.dev/psl/1/",
  KK4:  "https://wicket-goal.pages.dev/psl/2/",
  KK3: "https://wicket-goal.pages.dev/psl/m3u/?id=1",
};

// Get ?id=
const urlParams = new URLSearchParams(window.location.search);
let channel = urlParams.get('id');

// Default fallback (must exist in object)
const defaultChannel = "OMA";

function setChannel(id) {
  const iframe = document.getElementById('player');
  iframe.src = channels[id] || channels[defaultChannel];
}

// Load
setChannel(channel);
</script>

</body>
</html>
