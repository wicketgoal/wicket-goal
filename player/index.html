<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream with ID</title>

<style>
body {
  height: 100vh;
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  text-align: center;
  overflow: hidden;
  font-family: Tahoma, sans-serif;
  -webkit-font-smoothing: antialiased;
}

#player {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<iframe id="player" allowfullscreen allow="autoplay"></iframe>

<script>
const channels = {


  // FOOTBALL
  QS2: "https://wicket-goal.pages.dev/ipl/3/player?id=new",
  QS6: "https://ww2.sporttsonline.click/channels/hd/hd3.php",
  QS3: "https://wicket-goal.pages.dev/ipl/1/",
  QS4: "https://wgtv.pages.dev/wg?m=118206",
  QS5: "https://wicket-goal.pages.dev/ipl/3/player?id=kick",

  BM2: "https://wicket-goal.pages.dev/ipl/3/player?id=new",
  BM6: "https://ww2.sporttsonline.click/channels/hd/hd4.php",
  BM3: "https://wicket-goal.pages.dev/ipl/1/",
  BM4: "https://wgtv.pages.dev/wg?m=118206",
  BM5: "https://wicket-goal.pages.dev/ipl/3/player?id=kick",

  HS2: "https://embed.st/embed/admin/ppv-haiti-vs-scotland/1",
  HS6: "https://wicket-goal.pages.dev/ipl/1/",
  HS3: "https://wicket-goal.pages.dev/m3u/?src=https://live05.msdht.app/live/24561735.m3u8",
  HS4: "https://wgtv.pages.dev/wg?m=118206",
  HS5: "https://wicket-goal.pages.dev/ipl/2/",

  AT2: "https://embed.st/embed/admin/ppv-australia-vs-turkey/1",
  AT6: "https://wicket-goal.pages.dev/ipl/1/",
  AT3: "https://wicket-goal.pages.dev/m3u/?src=https://live05.msdht.app/live/24561735.m3u8",
  AT4: "https://wgtv.pages.dev/wg?m=118206",
  AT5: "https://wicket-goal.pages.dev/ipl/2/",

  
  PS1: "https://wgtv.pages.dev/wg?m=118206",
  PS3: "https://wgtv.pages.dev/wg?m=484845",
  PS4: "https://wgtv.pages.dev/wg?m=494201",

  PSG1: "https://wgtv.pages.dev/wg?m=113906",
  PSG3: "https://wgtv.pages.dev/wg?m=484845",
  PSG4: "https://wgtv.pages.dev/wg?m=494201"
};

// Get ?id=
const urlParams = new URLSearchParams(window.location.search);
const channel = urlParams.get("id");

// Default fallback
const defaultChannel = "R6";

function setChannel(id) {
  const iframe = document.getElementById("player");
  iframe.src = channels[id] || channels[defaultChannel];
}

// Load
setChannel(channel);
</script>

</body>
</html>
