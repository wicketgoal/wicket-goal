<body>

<iframe id="player" allowfullscreen allow="autoplay"></iframe>

<script>
const channels = {

  SAU3: "https://embed.st/embed/admin/ppv-australia-vs-turkey/1",

  SAU6: "https://wicket-goal.pages.dev/m3u/?src=https://live05.msdht.app/live/24561735.m3u8",

  PSG4: "https://wgtv.pages.dev/wg?m=494201"
};

// Get ?id=
const urlParams = new URLSearchParams(window.location.search);
const channel = urlParams.get("id");

// Default fallback
const defaultChannel = "R6";

function setChannel(id) {
  const iframe = document.getElementById("player");
  iframe.src = channels[id] || channels[defaultChannel];
}

// Load
setChannel(channel);
</script>
