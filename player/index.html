<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream with ID</title>

<style>
body {
  height: 100vh;
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  text-align: center;
  overflow: hidden;
  font-family: Tahoma, sans-serif;
  -webkit-font-smoothing: antialiased;
}

#player {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<iframe id="player" allowfullscreen allow="autoplay"></iframe>

<script>
const channels = {

  <!-- IPL MATCH 1 -->

  SH3: "https://wicket-goal.pages.dev/ipl/2",
  SH1: "https://wicket-goal.pages.dev/ipl/1/",
  SH5: "https://wicket-goal.pages.dev/m3u/?src=https://ott-nettv-02.nettv.com.np/iptvlivestream/netKANTIPURCINEPLEX1500.stream/chunks.m3u8",
  SH4:  "https://wicket-goal.pages.dev/ipl/3/player?id=fox",
  SH6:  "https://wicket-goal.pages.dev/ipl/iframe?id=1",

<!-- IPL MATCH 2 -->
  
  RCB5: "https://wicket-goal.pages.dev/m3u/?src=https://imgs-001.juno-api-noe.icu/secure/api/v1/lchd-ipltata.m3u8",
  RCB6: "https://wicket-goal.pages.dev/ipl/iframe?id=1",
  RCB4: "https://wicket-goal.pages.dev/ipl/3/player?id=star",
  RCB1:  "https://yosintv100.pages.dev/shaka?id=ipl1",
  RCB3:  "https://wicket-goal.pages.dev/ipl/3/player?id=fox",

  <!-- PSL MATCH 1 -->
  QG4: "https://wicket-goal.pages.dev/psl/1/",
  QG3: "https://wicket-goal.pages.dev/psl/2/",
  QG1: "https://wicket-goal.pages.dev/psl/2/",
  PZ4: "https://wicket-goal.pages.dev/psl/1/",
  PZ3:  "https://wicket-goal.pages.dev/psl/2/",
  PZ1: "https://wicket-goal.pages.dev/psl/2/",
  MS4:  "https://wicket-goal.pages.dev/psl/1/",
  MS3: "https://wicket-goal.pages.dev/psl/2/",
  MS1: "https://wicket-goal.pages.dev/psl/2/",
  LQ4: "https://wicket-goal.pages.dev/psl/1",
  LQ3: "https://wicket-goal.pages.dev/psl/2/",
  LQ1: "https://wicket-goal.pages.dev/psl/2/",
  IU4:  "https://wicket-goal.pages.dev/psl/1/",
  IU3:  "https://wicket-goal.pages.dev/psl/2/",
  IU1: "https://wicket-goal.pages.dev/psl/2/",
  R4:  "https://wicket-goal.pages.dev/psl/1/",
  R3:  "https://wicket-goal.pages.dev/psl/2/",
  R1: "https://wicket-goal.pages.dev/psl/2/",
  HK4:  "https://wicket-goal.pages.dev/psl/1/",
  HK3:  "https://wicket-goal.pages.dev/psl/2/",
  HK1: "https://wicket-goal.pages.dev/psl/2/",
  KK4:  "https://wicket-goal.pages.dev/psl/1/",
  KK3:  "https://wicket-goal.pages.dev/psl/2/",
  KK1: "https://wicket-goal.pages.dev/psl/2/",
};

// Get ?id=
const urlParams = new URLSearchParams(window.location.search);
let channel = urlParams.get('id');

// Default fallback (must exist in object)
const defaultChannel = "OMA";

function setChannel(id) {
  const iframe = document.getElementById('player');
  iframe.src = channels[id] || channels[defaultChannel];
}

// Load
setChannel(channel);
</script>

</body>
</html>
