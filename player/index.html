<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream with ID</title>

<style>
body {
  height: 100vh;
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  text-align: center;
  overflow: hidden;
  font-family: Tahoma, sans-serif;
  -webkit-font-smoothing: antialiased;
}

#player {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<iframe id="player" allowfullscreen allow="autoplay"></iframe>

<script>
const channels = {


  // FOOTBALL
  ST3: "https://embed.st/embed/admin/ppv-australia-vs-turkey/1",
  SR6: "https://wicket-goal.pages.dev/ipl/1/",
  ST2: "https://wicket-goal.pages.dev/m3u/?src=https://live05.msdht.app/live/24561735.m3u8",
  ST4: "https://wgtv.pages.dev/wg?m=118206",
  ST5: "https://wicket-goal.pages.dev/ipl/2/",

  ICE3: "https://embed.st/embed/admin/ppv-australia-vs-turkey/1",
  ICE6: "https://wicket-goal.pages.dev/ipl/1/",
  ICE2: "https://wicket-goal.pages.dev/m3u/?src=https://live05.msdht.app/live/24561735.m3u8",
  ICE4: "https://wgtv.pages.dev/wg?m=118206",
  ICE5: "https://wicket-goal.pages.dev/ipl/2/",

  NJ3: "https://embed.st/embed/admin/ppv-australia-vs-turkey/1",
  NJ6: "https://wicket-goal.pages.dev/ipl/1/",
  NJ2: "https://wicket-goal.pages.dev/m3u/?src=https://live05.msdht.app/live/24561735.m3u8",
  NJ4: "https://wgtv.pages.dev/wg?m=118206",
  NJ5: "https://wicket-goal.pages.dev/ipl/2/",

  GC3: "https://embed.st/embed/admin/ppv-australia-vs-turkey/1",
  GC6: "https://wicket-goal.pages.dev/ipl/1/",
  GC2: "https://wicket-goal.pages.dev/m3u/?src=https://live05.msdht.app/live/24561735.m3u8",
  GC4: "https://wgtv.pages.dev/wg?m=118206",
  GC5: "https://wicket-goal.pages.dev/ipl/2/",

  
  PS1: "https://wgtv.pages.dev/wg?m=118206",
  PS3: "https://wgtv.pages.dev/wg?m=484845",
  PS4: "https://wgtv.pages.dev/wg?m=494201",

  PSG1: "https://wgtv.pages.dev/wg?m=113906",
  PSG3: "https://wgtv.pages.dev/wg?m=484845",
  PSG4: "https://wgtv.pages.dev/wg?m=494201"
};

// Get ?id=
const urlParams = new URLSearchParams(window.location.search);
const channel = urlParams.get("id");

// Default fallback
const defaultChannel = "R6";

function setChannel(id) {
  const iframe = document.getElementById("player");
  iframe.src = channels[id] || channels[defaultChannel];
}

// Load
setChannel(channel);
</script>

</body>
</html>
